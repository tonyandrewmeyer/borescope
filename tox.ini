[tox]
envlist =
    py{311,312,313,314}
    lint
    unit
minversion = 4.22.0
isolated_build = true

[testenv]
deps =
    pytest
    pytest-cov
    pytest-mock
    ops
    pebble-shimmer
    prompt_toolkit
    PyYAML
commands =
    pytest {posargs}

[testenv:format]
description = Format code with ruff
dependency_groups = dev
commands =
    ruff format src tests

[testenv:lint]
description = Run linting with ruff and ty
dependency_groups = dev
commands =
    ruff check src tests
    ruff format --check src tests
    ty check src tests

[testenv:unit]
description = Run unit tests only (no pebble binary / juju required)
deps = {[testenv]deps}
commands =
    pytest tests/ --cov=borescope --cov-report=term-missing -m "not integration and not requires_juju" {posargs}

[testenv:integration]
description = Run integration tests (requires a local pebble binary)
deps = {[testenv]deps}
commands =
    pytest tests/ -m integration -v {posargs}

[testenv:docs]
description = Build the documentation site (docs/src/*.md -> docs/docs/*.html)
dependency_groups = docs
commands =
    python docs/src/_build.py {posargs}
