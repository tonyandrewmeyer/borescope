name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  # Allow the publish workflow to gate on these checks.
  workflow_call:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: uv lock --check
        run: uv lock --check
      - name: ruff check
        run: uv run --group dev ruff check src tests
      - name: ruff format
        run: uv run --group dev ruff format --check src tests
      - name: ty
        run: uv run --group dev ty check src tests

  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: >
          uv run --group dev pytest
          -m "not integration and not requires_juju"
          --cov=borescope --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Install pebble
        run: sudo snap install pebble --classic
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Integration tests (against a real pebble)
        run: uv run --group dev pytest -m integration -v

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Rebuild docs and diff against committed HTML
        run: uv run --group docs python docs/src/_build.py --check
