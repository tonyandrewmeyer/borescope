name: Dependency review

# Fails a PR that introduces a known-vulnerable transitive dependency before
# merge — complements Dependabot's after-the-fact PRs and the OSV-Scanner
# sweep over the locked tree.

on:
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # Allow the action to comment on the PR.
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: high
