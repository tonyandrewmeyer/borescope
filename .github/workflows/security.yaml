name: Dependency vulnerability scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  schedule:
    # Re-scan weekly so newly-disclosed CVEs in unchanged dependencies surface
    # even without a commit.
    - cron: "17 7 * * 1"

permissions: {}

jobs:
  osv-scan:
    # Scans lockfiles (incl. uv.lock) against OSV and uploads SARIF to the
    # Security tab. google/* is not in the zizmor ref-pin allowlist, so the
    # reusable workflow is SHA-pinned.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
    permissions:
      security-events: write  # Upload SARIF to the Security tab.
      contents: read
      actions: read
    with:
      # Surface findings via the Security tab rather than failing the run (this
      # is not a merge-gating check).
      fail-on-vuln: false

  pip-audit:
    # PyPA's own scanner against the PyPI Advisory DB / OSV — overlaps with
    # OSV-Scanner but provides a second, PyPA-maintained source of truth and
    # scans the resolved (pinned) set rather than the lockfile graph.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Export runtime deps from uv.lock
        run: |
          uv export \
            --no-dev \
            --no-hashes \
            --no-emit-project \
            --format requirements-txt \
            > requirements.txt
      - name: Run pip-audit
        # --no-deps because the exported file already contains the fully
        # resolved transitive set; --disable-pip skips re-resolution.
        run: uvx pip-audit --strict --disable-pip --no-deps --requirement requirements.txt
