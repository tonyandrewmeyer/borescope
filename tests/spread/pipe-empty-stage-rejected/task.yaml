summary: |
  POSIX XCU §2.9.2 — a pipeline with an empty stage is a syntax error.
systems:
  - ubuntu-24.04

execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html#tag_18_09_02
  # Grammar requires a command on either side of '|'. POSIX shells exit
  # non-zero with a syntax-error message.
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  set +e
  out="$(borescope_run --command 'cat /etc/hostname |' 2>&1)"
  rc=$?
  set -e

  test "$rc" -ne 0
  echo "$out" | MATCH 'empty pipe stage|syntax error'

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
