summary: |
  POSIX XCU §cat — a non-existent file operand causes a diagnostic and a
  non-zero exit status.
systems:
  - ubuntu-24.04

execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/cat.html
  # "EXIT STATUS: >0  An error occurred."
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  set +e
  out="$(borescope_run -c 'cat /no/such/file' 2>&1)"
  rc=$?
  set -e

  test "$rc" -ne 0
  echo "$out" | MATCH 'cat:.*/no/such/file'

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
