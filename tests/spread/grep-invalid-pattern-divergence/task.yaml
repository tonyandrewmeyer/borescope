summary: |
  KNOWN DIVERGENCE from POSIX XCU §grep — borescope exits 1 on an invalid
  pattern; POSIX requires >1 (typically 2) to distinguish "no match" from
  "syntax error".
systems:
  - ubuntu-24.04

# POSIX EXIT STATUS for grep:
#   0  one or more lines selected
#   1  no lines selected
#   >1 an error occurred
# borescope's grep returns code=1 in both the "no match" and "invalid pattern"
# cases, collapsing the two outcomes. This task pins current behaviour so a
# future fix flips it green by reversal.
execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/grep.html
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  workdir="$(mktemp -d)"
  printf 'x\n' > "${workdir}/f"

  set +e
  borescope_run --command "grep '[' ${workdir}/f" >/dev/null 2>&1
  rc=$?
  set -e

  test "$rc" -eq 1

  rm -rf "${workdir}"

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
