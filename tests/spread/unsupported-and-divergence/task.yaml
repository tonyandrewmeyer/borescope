summary: |
  KNOWN DIVERGENCE from POSIX XCU §2.9.3 — borescope v1 rejects `&&`
  instead of running the second command only when the first succeeds.
systems:
  - ubuntu-24.04

# parser.py treats `&&`/`||` as unsupported v1 syntax. POSIX defines them as
# AND/OR conditional execution. Test pins current behaviour so a future v2
# parser flips this green by reversal.
execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html#tag_18_09_03
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  set +e
  out="$(borescope_run --command 'echo a && echo b' 2>&1)"
  rc=$?
  set -e

  test "$rc" -ne 0
  echo "$out" | MATCH "not supported"

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
