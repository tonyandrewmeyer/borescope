summary: |
  KNOWN DIVERGENCE from POSIX XCU §2.7.2 — borescope v1 rejects `>`
  instead of redirecting standard output.
systems:
  - ubuntu-24.04

# parser.py treats `>`/`>>`/`<` as unsupported v1 syntax (operators that need
# file-system side effects beyond a simple pipeline). POSIX defines them as
# output/input redirections. Pinning current behavior.
execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html#tag_18_07_02
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  set +e
  out="$(borescope_run -c 'echo a > /tmp/borescope-spread-out' 2>&1)"
  rc=$?
  set -e

  test "$rc" -ne 0
  echo "$out" | MATCH "not supported"
  test ! -e /tmp/borescope-spread-out

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
