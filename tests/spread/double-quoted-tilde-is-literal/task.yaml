summary: |
  POSIX XCU §2.6.1 — a `~` inside double-quotes is a literal character,
  not a tilde-prefix subject to expansion.
systems:
  - ubuntu-24.04

execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html#tag_18_06_01
  # "only an unquoted tilde-prefix shall be expanded"
  # A tilde enclosed in double-quotes is quoted, so it must not be
  # substituted with $HOME.
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  # Outer single-quotes pass the string verbatim to borescope.
  out="$(borescope_run -c 'echo "~"')"
  echo "$out" | MATCH '^~$'

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
