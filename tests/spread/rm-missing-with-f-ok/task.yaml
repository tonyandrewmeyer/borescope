summary: |
  POSIX XCU §rm — with -f, a missing operand does not produce a diagnostic
  and exit status is 0.
systems:
  - ubuntu-24.04

execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/rm.html
  # "-f  Do not prompt for confirmation. Do not write diagnostic messages
  #      or modify the exit status in the case of nonexistent operands."
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  set +e
  # No 2>&1: spread runs tasks under `set -x`, which sends xtrace to stderr.
  # Capturing combined streams would put the trace into $out and break the
  # `test -z` "no diagnostic" check. The matching stderr-empty assertion is
  # via a temp file.
  err="$(mktemp)"
  out="$(borescope_run -c 'rm -f /no/such/file' 2>"$err")"
  rc=$?
  set -e

  test "$rc" -eq 0
  test -z "$out"
  # POSIX rm -f: "Do not write diagnostic messages ... in the case of
  # nonexistent operands."
  test ! -s "$err"
  rm -f "$err"

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
