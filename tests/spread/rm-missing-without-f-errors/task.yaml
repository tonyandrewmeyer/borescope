summary: |
  POSIX XCU §rm — without -f, a missing operand is a diagnostic and a
  non-zero exit status.
systems:
  - ubuntu-24.04

execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/rm.html
  # "EXIT STATUS: >0  An error occurred."
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  set +e
  out="$(borescope_run --command 'rm /no/such/file' 2>&1)"
  rc=$?
  set -e

  test "$rc" -ne 0
  echo "$out" | MATCH 'rm:.*/no/such/file'

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
