summary: |
  POSIX XCU §head — `-n number` writes the first <number> lines.
systems:
  - ubuntu-24.04

execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/head.html
  # "-n number  The first number lines of each input file shall be copied
  #             to standard output."
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  workdir="$(mktemp -d)"
  seq 1 5 > "${workdir}/five"

  out="$(borescope_run --command "head -n 2 ${workdir}/five")"
  echo "$out" | MATCH '^1$'
  echo "$out" | MATCH '^2$'
  echo "$out" | NOMATCH '^3$'

  rm -rf "${workdir}"

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
