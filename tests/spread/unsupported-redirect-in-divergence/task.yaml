summary: |
  KNOWN DIVERGENCE from POSIX XCU §2.7.1 — borescope v1 rejects `<`
  instead of redirecting standard input.
systems:
  - ubuntu-24.04

execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html#tag_18_07_01
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  set +e
  out="$(borescope_run --command 'cat < /etc/hostname' 2>&1)"
  rc=$?
  set -e

  test "$rc" -ne 0
  echo "$out" | MATCH "not supported"

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
