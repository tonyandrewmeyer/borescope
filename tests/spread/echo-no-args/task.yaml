summary: |
  POSIX XCU §echo — with no operands, a single <newline> is written.
systems:
  - ubuntu-24.04

# Known divergence: borescope's repl skips emitting empty output, so `echo`
# with no operands produces zero bytes instead of "\n". This task is expected
# to fail until basic.Echo / _emit are reconciled with the spec.
execute: |
  # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/echo.html
  # "If there are no arguments, only the <newline> shall be written."
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_up

  raw="$(borescope_run -c 'echo' | wc -c)"
  test "$raw" -eq 1  # just "\n"

restore: |
  source "${SPREAD_PATH}/tests/spread/lib.sh"
  pebble_down
