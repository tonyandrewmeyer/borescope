<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="borescope">
  <defs>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0d7d8a"/>
    </linearGradient>
  </defs>
  <!-- scope barrel / outer ring -->
  <circle cx="52" cy="52" r="34" fill="none" stroke="url(#lens)" stroke-width="8"/>
  <!-- inner lens -->
  <circle cx="52" cy="52" r="18" fill="url(#lens)" opacity="0.18"/>
  <!-- crosshair -->
  <g stroke="#17a2b8" stroke-width="4" stroke-linecap="round">
    <line x1="52" y1="34" x2="52" y2="44"/>
    <line x1="52" y1="60" x2="52" y2="70"/>
    <line x1="34" y1="52" x2="44" y2="52"/>
    <line x1="60" y1="52" x2="70" y2="52"/>
  </g>
  <!-- glint -->
  <circle cx="44" cy="44" r="5" fill="#2dd4bf"/>
  <!-- handle / probe -->
  <line x1="77" y1="77" x2="104" y2="104" stroke="url(#lens)" stroke-width="11" stroke-linecap="round"/>
</svg>
