name: borescope
base: core22
summary: A natural shell for debugging Juju Kubernetes workload containers
description: |
  borescope gives you a prompt that feels like bash but talks to a Kubernetes
  charm workload container's Pebble instead of a real shell — handy when the
  rock has no shell at all. It uses your existing Juju authority (juju ssh),
  needs no kubectl/cluster-admin, and puts Pebble's vocabulary (services, logs,
  plan, ...) front and centre alongside familiar commands (ls, cat, grep, ...).
version: '0.1.0-dev'
grade: devel
# Classic confinement: borescope shells out to the `juju` snap and reads the
# user's Juju config in $HOME, neither of which is possible under strict
# confinement. This mirrors how comparable Juju debug tooling (e.g. jhack) ships.
confinement: classic

apps:
  borescope:
    command: bin/borescope
  juju-borescope:
    command: bin/juju-borescope

parts:
  borescope:
    plugin: python
    source: .
    stage-packages:
      - python3-venv
    build-environment:
      - PARTS_PYTHON_INTERPRETER: python3
  wrappers:
    plugin: dump
    source: .
    organize:
      juju-borescope: bin/juju-borescope
    stage:
      - bin/juju-borescope
